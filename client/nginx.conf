server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # דחיסת gzip לנכסים
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # תמיכה ב-React Router (SPA):
  # כל נתיב שלא קיים כקובץ פיזי מוגש כ-index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # קאשינג ארוך לנכסים עם hash בשם הקובץ
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
