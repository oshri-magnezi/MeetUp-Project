# ─────────────────────────────────────────────
#  MeetUp — Full Stack (Frontend + Backend + MongoDB)
#  הרצה:  docker compose up --build
#  Frontend:  http://localhost:8080
#  Backend:   http://localhost:5000
# ─────────────────────────────────────────────

services:
  # ── מסד נתונים MongoDB ──
  db:
    image: mongo:7
    container_name: meetup-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meetup-net

  # ── שרת ה-API (Express) ──
  backend:
    build:
      context: ./server
      target: production
    container_name: meetup-backend
    restart: unless-stopped
    # env_file — טוען את הסודות (JWT_SECRET וכו') מקובץ .env הקיים
    env_file:
      - ./server/.env
    # environment — דורס ערכים ספציפיים לרשת ה-Docker (גובר על env_file)
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/meetup
      - CLIENT_URL=http://localhost:8080
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy # מחכה ש-Mongo מוכן לפני עליית ה-Backend
    networks:
      - meetup-net

  # ── לקוח React (נבנה ומוגש ע"י Nginx) ──
  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: meetup-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - meetup-net

volumes:
  mongo-data:

networks:
  meetup-net:
    driver: bridge
